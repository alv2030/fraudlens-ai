name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install test dependencies
        run: |
          pip install \
            pytest==8.3.2 \
            httpx==0.27.0 \
            pandas==2.2.2 \
            numpy==1.26.4 \
            scikit-learn==1.5.1 \
            fastapi==0.112.0 \
            pydantic==2.8.2 \
            pydantic-settings==2.4.0 \
            python-dotenv==1.0.1 \
            sqlalchemy==2.0.32 \
            psycopg2-binary==2.9.9 \
            redis==5.0.8 \
            kafka-python==2.0.2 \
            pyspark==3.5.1 \
            joblib==1.4.2

      - name: Run tests
        run: python -m pytest -q
